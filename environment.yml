name: rdock-cv
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - numpy
  - opencv
  - pip
  - pip:
    - boto3
    - torch
    - torchvision
    - torchaudio
    - matplotlib
    - einops
    - scikit-learn
    - huggingface_hub
    - safetensors
    - roma
    # MASt3R-SLAM dependencies
    - plyfile
    - natsort
    - evo
    - git+https://github.com/princeton-vl/lietorch.git
    # Optional: pyrealsense2 (for live camera support, not needed for MP4 processing)
    # - pyrealsense2
